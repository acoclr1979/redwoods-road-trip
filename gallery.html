<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Photo Dump — Redwoods Road Trip</title>
    <meta property="og:title" content="The Photo Dump — Redwoods Road Trip">
    <meta property="og:description" content="Every trip photo, in one place.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --forest: #0d1f14;
            --forest-deep: #081410;
            --moss: #4a7c59;
            --moss-light: #7fae87;
            --amber: #d9a441;
            --cream: #f2ead3;
            --fog: rgba(242,234,211,0.55);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            color: var(--cream);
            background: var(--forest-deep);
        }

        .mosaic-bg { position: fixed; inset: 0; display: grid; z-index: 0; }
        .mosaic-bg .mc { background-repeat: no-repeat; background-position: center center; background-size: 200%; }
        .mosaic-overlay { position: fixed; inset: 0; background: rgba(8,20,16,0.88); z-index: 1; }

        .page-wrap { position: relative; z-index: 2; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .hero { width: 100%; max-width: 780px; padding: 72px 30px 52px; text-align: center; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--fog);
            text-decoration: none;
            font-size: 0.75em;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 36px;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--cream); }

        .hero-eyebrow { font-size: 0.8em; letter-spacing: 5px; text-transform: uppercase; color: var(--moss-light); margin-bottom: 14px; }
        .hero-title { font-size: clamp(2.6rem, 10vw, 4.6rem); font-weight: 900; line-height: 1.02; letter-spacing: -2px; margin-bottom: 16px; color: var(--cream); }
        .hero-sub { font-size: 0.9em; color: var(--fog); line-height: 1.65; }

        .content { width: 100%; max-width: 1100px; padding: 0 24px 100px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        .gallery-item {
            display: block;
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(242,234,211,0.05);
            border: 1px solid rgba(242,234,211,0.12);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.25s ease;
        }

        .gallery-item:hover img { transform: scale(1.06); }

        .gallery-item.featured { grid-column: span 2; grid-row: span 2; }

        .gallery-caption {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 8px 10px 7px;
            font-size: 0.72em;
            color: var(--cream);
            background: linear-gradient(0deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 100%);
        }

        .gallery-empty { font-size: 0.85em; color: var(--fog); padding: 6px 2px; }

        @media (max-width: 600px) {
            .hero { padding: 56px 20px 40px; }
            .content { padding: 0 16px 80px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 7px; }
        }
    </style>
</head>
<body>

    <div class="mosaic-bg" id="mosaicBg"></div>
    <div class="mosaic-overlay"></div>

    <div class="page-wrap">

        <div class="hero">
            <a href="./index.html" class="back-link">← Back to the Trip</a>
            <p class="hero-eyebrow">🌲 Redwoods Road Trip</p>
            <h1 class="hero-title">The Photo Dump</h1>
            <p class="hero-sub">Every trip photo, in one place.<br>Tap any image to see it full size.</p>
        </div>

        <div class="content">
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <script src="./photos.js"></script>
    <script src="./mosaic.js"></script>
    <script src="./gallery.js"></script>
</body>
</html>
